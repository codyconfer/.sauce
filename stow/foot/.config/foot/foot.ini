# sauce foot config — see `man 5 foot`. Symlinked by scripts/build-sway.sh.
# Edit in the repo, not in place.

[main]
font=monospace:size=10
pad=8x8

[cursor]
color=1e1e2e cdd6f4

# Catppuccin Mocha — matches the palette in the sway/waybar/mako configs.
# Note: foot expects hex colors with no leading '#'.
[colors]
background=1e1e2e
foreground=cdd6f4

selection-background=414458
selection-foreground=cdd6f4

# Normal / regular
regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de

# Bright
bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=a6adc8
